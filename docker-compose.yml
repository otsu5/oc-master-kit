services:

  # ══════════════════════════════════════════════════════
  #  Ollama — ローカルLLMエンジン（メイン推論基盤）
  # ══════════════════════════════════════════════════════
  ollama:
    image: ollama/ollama:latest
    container_name: oc_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=24h
      - OLLAMA_MAX_LOADED_MODELS=2
    restart: unless-stopped
    # GPU使用時はコメントアウト解除
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # ══════════════════════════════════════════════════════
  #  OC-Core — 基盤OS（Job Queue / Approval / Runner）
  # ══════════════════════════════════════════════════════
  core:
    build:
      context: ./core
      dockerfile: Dockerfile
    container_name: oc_core
    env_file: .env
    expose:
      - "8787"   # コンテナ間通信のみ（ホストに公開しない）
    volumes:
      - ${OC_MOUNT}:/oc
    depends_on:
      - ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8787/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ══════════════════════════════════════════════════════
  #  Telegram Bot — モバイル指揮・承認・通知
  # ══════════════════════════════════════════════════════
  telegram:
    build:
      context: ./interfaces/telegram
      dockerfile: Dockerfile
    container_name: oc_telegram
    env_file: .env
    depends_on:
      core:
        condition: service_healthy
    restart: unless-stopped

  # ══════════════════════════════════════════════════════
  #  Discord Bot — 書庫モード（スレッド整理・閲覧・検索）
  #  Telegramがメイン指揮、Discordは情報アーカイブUI
  # ══════════════════════════════════════════════════════
  discord:
    build:
      context: ./interfaces/discord
      dockerfile: Dockerfile
    container_name: oc_discord
    env_file: .env
    volumes:
      - ${OC_MOUNT}:/oc:ro   # read-only（Discordは閲覧のみ）
    depends_on:
      core:
        condition: service_healthy
    restart: unless-stopped

  # ══════════════════════════════════════════════════════
  #  OpenWebUI — チャットUI（PCでAI相談・モデル管理）
  # ══════════════════════════════════════════════════════
  openwebui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: oc_openwebui
    ports:
      - "3000:8080"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY}
      - WEBUI_AUTH=true
    volumes:
      - openwebui_data:/app/backend/data
    depends_on:
      - ollama
    restart: unless-stopped

  # ══════════════════════════════════════════════════════
  #  Syncthing — P2Pファイル同期（生成物→モバイル）
  #  注意: 同期 ≠ バックアップ。rcloneと必ず併用
  #  注意: assetsは同期対象外（削除禁止ポリシー違反防止）
  # ══════════════════════════════════════════════════════
  syncthing:
    image: syncthing/syncthing:latest
    container_name: oc_syncthing
    environment:
      - PUID=1000
      - PGID=1000
    ports:
      - "8384:8384"
      - "22000:22000/tcp"
      - "22000:22000/udp"
      - "21027:21027/udp"
    volumes:
      - syncthing_config:/var/syncthing/config
      - ${OC_MOUNT}/staging:/sync/staging
      - ${OC_MOUNT}/ObsidianVault:/sync/vault
      # assetsは意図的に除外（削除禁止ポリシー）
    restart: unless-stopped

volumes:
  ollama_data:
  openwebui_data:
  syncthing_config:
